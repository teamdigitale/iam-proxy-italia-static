<!DOCTYPE html>
<html lang="it">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="tab-title">QR Code - Preview</title>
  <meta name="description" content="Preview della pagina QR code">
  <link rel="shortcut icon" href="spid/favicon-32x32.png">

  <link rel="stylesheet" href="css/style.css">
  <link href="css/bootstrap-italia.min.css" rel="stylesheet">
  <link href="css/ita.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next@25.5.2/i18next.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/bootstrap-italia.bundle.min.js"></script>
  <script src="js/header-lang-dropdown.js"></script>

  <style>
    :root {
      --qr-size: 256px;
      --brand-blue: #0072CE;
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; }
    .qr-code { display: block; margin: auto; background-color: #fff; width: var(--qr-size); height: var(--qr-size); }
    .qr-code-img { width: 10em; height: 10em; }
    .btn-custom { background-color: var(--brand-blue); color: white; }
    footer { margin: 0; padding: 1rem 0; background-color: #004C99; color: white; width: 100%; }
  </style>
</head>
<body>
<header class="it-header-wrapper">
  <div class="it-header-slim-wrapper bg-primary">
    <div class="container">
      <div class="it-header-slim-wrapper-content d-flex justify-content-between align-items-center">
        <span class="d-none d-lg-block navbar-brand text-white"><strong>Preview</strong></span>
        <div class="it-header-slim-right-zone">
          <div class="nav-item dropdown it-header-lang-dropdown">
            <a href="#" id="languagesDropButton" role="button" class="nav-link dropdown-toggle"
              data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              <span class="visually-hidden">lingua attiva:</span>
              <span class="it-header-lang-label">ITA</span>
              <svg class="icon icon-sm ms-1 d-none d-lg-block" aria-hidden="true">
                <use xlink:href="svg/sprites.svg#it-expand"></use>
              </svg>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <div class="row">
                <div class="col-12">
                  <div class="link-list-wrapper">
                    <ul class="link-list" aria-labelledby="languagesDropButton">
                      <li>
                        <a class="dropdown-item list-item it-lang-option active" href="#" data-lang="it" role="button">
                          <span lang="it">Italiano</span>
                        </a>
                      </li>
                      <li>
                        <a class="dropdown-item list-item it-lang-option" href="#" data-lang="en" role="button">
                          <span lang="en">English</span>
                        </a>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div style="background-color: #F2F7FC;">
    <div class="container py-3">
      <div class="d-flex align-items-center gap-3">
        <svg class="icon icon-lg" aria-hidden="true" style="width: 2.5rem; height: 2.5rem;">
          <use xlink:href="bootstrap-italia/svg/sprites.svg#it-code-circle"></use>
        </svg>
        <div style="width: 1px; height: 1.5rem; background-color: #999;"></div>
        <img src="img/IT-Wallet-Logo-Primary-BlueItalia.svg" alt="IT-Wallet" style="height: 2rem; width: auto;" />
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container py-5 text-center">
    <h2 id="content-title" class="mb-4"><b>Inquadra il codice QR</b></h2>
    <p id="content-text" class="text-secondary small mb-4">Usa la funzionalità dell'app <b>IT-Wallet</b> o la fotocamera del tuo smartphone</p>

    <script src="js/qrcode/qr-code.js"></script>
    <div id="content-qrcode" class="d-flex justify-content-center mb-4">
      <div id="content-qrcode-payload">
        <qr-code contents="https://preview.example.com" module-color="#0072CE" position-ring-color="#0072CE" position-center-color="#0072CE" class="qr-code">
          <img class="icon-qr-code" src="it-wallet/wallet-icon-blue.svg" slot="icon"/>
        </qr-code>
      </div>
    </div>

    <p id="content-qrcode-info-text" class="text-muted mb-3">Il codice QR è valido per <b>300</b> secondi (preview)</p>
    <div id="content-function" class="mt-3">
      <a href="disco.html" class="btn btn-outline-primary btn-custom">Indietro</a>
    </div>
  </div>
</main>

<footer class="w-100">
  <div class="container h-100 d-flex align-items-center">
    <div class="d-flex flex-wrap justify-content-start">
      <a id="footer-legal" href="#" class="text-white me-4 mb-2" target="_blank" rel="noopener">Note legali</a>
      <a id="footer-privacy" href="#" class="text-white me-4 mb-2" target="_blank" rel="noopener">Privacy Policy</a>
      <a id="footer-accessibility" href="#" class="text-white mb-2" target="_blank" rel="noopener">Dichiarazione Accessibilità</a>
    </div>
  </div>
</footer>

<script>
  i18next.use(i18nextHttpBackend).init({
    lng: localStorage.getItem('lang') || 'it',
    fallbackLng: 'it',
    backend: { loadPath: 'locales/qr-{{lng}}.json' }
  }).then(function() {
    function applyQrTexts() {
      var t = i18next.t;
      $('#tab-title').html(t('page_title'));
      $('#content-title').html('<b>' + t('contentTitle') + '</b>');
      $('#content-qrcode-info-text').html(t('qrCodeValidInfo', {seconds: '300'}) + ' (preview)');
      $('#content-text').html(t('supportText'));
      $('#content-function a').text(t('backLabel'));
      $('#footer-legal').text(t('footer.legal_notice'));
      $('#footer-privacy').text(t('footer.privacy_policy'));
      $('#footer-accessibility').text(t('footer.accessibility_statement'));
    }
    if (typeof initHeaderLangDropdown === 'function') {
      initHeaderLangDropdown(i18next, {
        afterLanguageChange: function (lng) {
          var code = (lng || 'it').split('-')[0];
          localStorage.setItem('lang', code === 'en' ? 'en' : 'it');
          applyQrTexts();
        }
      });
    }
    applyQrTexts();
  });
</script>
</body>
</html>
